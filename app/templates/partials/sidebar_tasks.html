<ul class="nav flex-column">
  <li class="nav-item">
    <a class="nav-link {{ 'active' if request.endpoint and request.endpoint.startswith('standard_updates_bp.') else '' }}" href="{{ url_for('tasks_bp.launcher') }}">
      <i class="bi bi-grid me-2"></i>
      功能入口
    </a>
    <a class="nav-link {{ 'active' if ((request.endpoint and request.endpoint.startswith('tasks_bp.') and request.endpoint not in ['tasks_bp.standards', 'tasks_bp.task_standard_mapping']) or request.endpoint == 'flow_builder_bp.flow_builder') else '' }}" href="{{ url_for('tasks_bp.tasks') }}">
      <i class="bi bi-list-task me-2"></i>
      任務管理
    </a>
    {% if task and task.id %}
    <div class="px-3 pt-3 pb-2 small text-uppercase fw-semibold text-muted">任務工作區</div>
    <a class="nav-link {{ 'active' if request.path == url_for('tasks_bp.task_detail', task_id=task.id) else '' }}" href="{{ url_for('tasks_bp.task_detail', task_id=task.id) }}">
      <i class="bi bi-info-circle me-2"></i>
      任務詳情
    </a>
    <a class="nav-link {{ 'active' if request.path == url_for('tasks_bp.task_mapping', task_id=task.id) else '' }}" href="{{ url_for('tasks_bp.task_mapping', task_id=task.id) }}">
      <i class="bi bi-diagram-3-fill me-2"></i>
      Mapping
    </a>
    <a class="nav-link {{ 'active' if request.endpoint == 'flow_builder_bp.flow_builder' and '/batch' not in request.path else '' }}" href="{{ url_for('flow_builder_bp.flow_builder', task_id=task.id) }}">
      <i class="bi bi-diagram-3 me-2"></i>
      流程管理
    </a>
    {% endif %}
  </li>
</ul>
